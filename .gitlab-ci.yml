image: php:8.3-fpm-bullseye

stages:
  - build
  - test

variables:
  # Correction PostgreSQL : On définit le mot de passe obligatoire
  POSTGRES_DB: testing
  POSTGRES_PASSWORD: root
  # Configuration Laravel pour PostgreSQL
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: testing
  DB_USERNAME: postgres
  DB_PASSWORD: root

cache:
  paths:
    - vendor/

before_script:
  - apt-get update -yqq
  - apt-get install -yqq libpq-dev libzip-dev zip unzip git
  - docker-php-ext-install pdo_pgsql zip
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

install_dependencies:
  stage: build
  script:
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

run_tests:
  stage: test
  services:
    # On utilise le service postgres (assure-toi que c'est bien pgsql que tu veux)
    - postgres:15
  dependencies:
    - install_dependencies
  script:
    - cp .env.example .env.testing
    - php artisan key:generate --env=testing
    - php artisan migrate --env=testing --force
    - php artisan test