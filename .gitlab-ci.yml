# .gitlab-ci.yml pour Laravel 10 - setup + test

stages:
  - setup
  - test

variables:
  # Pour éviter de mettre en dur le mot de passe de la DB
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: laravel
  DB_USERNAME: root
  DB_PASSWORD: secret
  # Timeout pour composer
  COMPOSER_MEMORY_LIMIT: -1

# Service MySQL pour les tests
services:
  - name: mysql:8.0
    alias: mysql
    command:
      [
        "--default-authentication-plugin=mysql_native_password",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]

# Stage setup
setup:
  stage: setup
  image: php:8.2 # image officielle PHP
  before_script:
    - apt-get update && apt-get install -y unzip git curl libzip-dev
    - docker-php-ext-install pdo pdo_mysql zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist
    # Attendre que MySQL soit prêt
    - until mysql -h "$DB_HOST" -u "$DB_USERNAME" -p"$DB_PASSWORD" -e "show databases;" ; do sleep 2; done
    - php artisan key:generate
    - php artisan migrate --force
  script:
    - echo "Setup terminé avec succès"

# Stage test
test:
  stage: test
  image: php:8.2
  dependencies:
    - setup
  before_script:
    - apt-get update && apt-get install -y unzip git curl libzip-dev
    - docker-php-ext-install pdo pdo_mysql zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cp .env.example .env
    - composer install --no-interaction --prefer-dist
  script:
    - php artisan test --parallel