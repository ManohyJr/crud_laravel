# .gitlab-ci.yml
stages:
  - test

variables:
  # Variables globales pour Laravel
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: laravel_test
  DB_USERNAME: root
  DB_PASSWORD: rootpassword
  # Pour éviter les problèmes d'apt dans Docker
  DEBIAN_FRONTEND: noninteractive

test_job:
  stage: test
  image: php:8.3-fpm
  services:
    - name: mysql:8.0
      alias: mysql
      command: ["--default-authentication-plugin=mysql_native_password"]
      environment:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: laravel_test
        MYSQL_ALLOW_EMPTY_PASSWORD: "no"

  before_script:
    - apt-get update && apt-get install -y unzip git curl libpng-dev libonig-dev libxml2-dev zip mariadb-client
    - docker-php-ext-install pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install
    - php artisan key:generate
    - php artisan migrate --force

  script:
    - php artisan test

  only:
    - ajout_ci_cd