stages:
  - setup
  - test

variables:
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: laravel_test
  DB_USERNAME: laravel_user
  DB_PASSWORD: laravel_pass

# === Stage setup: installer les dépendances ===
setup:
  stage: setup
  image: php:8.3-fpm
  services:
    - name: mysql:8.0
      alias: mysql
      command: ["--default-authentication-plugin=mysql_native_password"]
      variables:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: laravel_test
        MYSQL_USER: laravel_user
        MYSQL_PASSWORD: laravel_pass
  before_script:
    # Installer dépendances système + extensions PHP + Composer
    - apt-get update && apt-get install -y unzip git curl libpng-dev libonig-dev libxml2-dev zip mariadb-client
    - docker-php-ext-install pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    # Attendre que MySQL soit prêt
    - |
      until mysql -h"$DB_HOST" -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT 1" >/dev/null 2>&1; do
        echo "Waiting for MySQL to be ready..."
        sleep 5
      done
    # Installer les dépendances Laravel
    - composer install --no-interaction --prefer-dist --optimize-autoloader
  script:
    - echo "Setup completed successfully"

# === Stage test: exécuter les migrations et les tests ===
test:
  stage: test
  image: php:8.3-fpm
  services:
    - name: mysql:8.0
      alias: mysql
      command: ["--default-authentication-plugin=mysql_native_password"]
      variables:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: laravel_test
        MYSQL_USER: laravel_user
        MYSQL_PASSWORD: laravel_pass
  before_script:
    # Attendre que MySQL soit prêt
    - |
      until mysql -h"$DB_HOST" -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT 1" >/dev/null 2>&1; do
        echo "Waiting for MySQL to be ready..."
        sleep 5
      done
  script:
    - php artisan migrate --force
    - php artisan test --parallel