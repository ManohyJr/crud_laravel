stages:
  - test

variables:
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: laravel_test
  DB_USERNAME: laravel_user
  DB_PASSWORD: laravel_pass
  DEBIAN_FRONTEND: noninteractive

test_job:
  stage: test
  image: php:8.3-fpm
  services:
    - name: mysql:8.0
      alias: mysql
      command: ["--default-authentication-plugin=mysql_native_password"]
      variables:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: laravel_test
        MYSQL_USER: laravel_user
        MYSQL_PASSWORD: laravel_pass

  before_script:
    - apt-get update && apt-get install -y unzip git curl libpng-dev libonig-dev libxml2-dev zip mariadb-client
    - docker-php-ext-install pdo_mysql
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --prefer-dist
    - until mysql -h"$DB_HOST" -u"$DB_USERNAME" -p"$DB_PASSWORD" -e "SELECT 1" >/dev/null 2>&1; do echo "Waiting for MySQL..."; sleep 2; done
    - php artisan key:generate
    - php artisan migrate --force

  script:
    - php artisan test