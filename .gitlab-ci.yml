stages:
  - test
  - deploy

variables:
  # Variables globales
  MYSQL_ROOT_PASSWORD: secret
  MYSQL_DATABASE: laravel_test
  MYSQL_USER: laravel
  MYSQL_PASSWORD: secret
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: laravel_test
  DB_USERNAME: laravel
  DB_PASSWORD: secret

# Job pour lancer les tests
test_job:
  stage: test
  image: ghcr.io/laravelphp/php-fpm:8.3
  services:
    - name: mysql:8.0
      alias: mysql
  before_script:
    - composer install --no-interaction --prefer-dist --optimize-autoloader
    - cp .env.example .env
    - php artisan key:generate
    - until mysqladmin ping -h mysql --silent; do echo "Waiting for MySQL..."; sleep 2; done
  script:
    - php artisan migrate --force
    - php artisan test --parallel
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - vendor/
  artifacts:
    reports:
      junit: storage/test-results/junit.xml