image: php:8.2-bullseye

stages:
  - build
  - test

variables:
  # CONFIGURATION MYSQL (L'erreur venait d'ici)
  MYSQL_DATABASE: testing
  MYSQL_ROOT_PASSWORD: root
  # L'hôte doit correspondre au nom du service défini plus bas
  DB_HOST: mysql 
  DB_CONNECTION: mysql
  DB_PORT: 3306
  DB_DATABASE: testing
  DB_USERNAME: root
  DB_PASSWORD: root

cache:
  paths:
    - vendor/

before_script:
  - apt-get update -yqq
  - apt-get install -yqq libzip-dev zip unzip git mariadb-client
  # Installation rapide des extensions nécessaires
  - docker-php-ext-install pdo_mysql zip
  - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

install_dependencies:
  stage: build
  script:
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

run_tests:
  stage: test
  services:
    # On appelle explicitement le service mysql
    - name: mysql:8.0
      alias: mysql
  dependencies:
    - install_dependencies
  script:
    - cp .env.example .env.testing
    - php artisan key:generate --env=testing
    # On attend que MySQL soit prêt avant de migrer
    - php artisan migrate --env=testing --force
    - php artisan test